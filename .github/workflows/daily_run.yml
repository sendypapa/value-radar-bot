name: Value Radar Bot

on:
  schedule:
    - cron: '15 23 * * *' # 한국 시간 오전 8시 15분
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python 3.12 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 2026년 최신 도구 설치
        run: |
          pip install --upgrade pip
          # 최신 google-genai 라이브러리 설치
          pip install -U google-genai finance-datareader requests pandas
      - name: 로봇 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
