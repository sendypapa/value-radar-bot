name: Value Radar Bot

on:
  schedule:
    # [수정] 한국시간 오전 8:00(UTC 23:00)로 설정. 
    # 깃허브 지연(10~15분)을 고려하면 8시 10분~15분 사이에 도착하게 됩니다.
    - cron: '00 23 * * *'
  workflow_dispatch:

# 로봇에게 장부를 쓸 권한(write)을 부여합니다.
permissions: write-all

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai finance-datareader requests pandas

      - name: Run Stock Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # [추가] 중요: 오늘 추천한 종목(trades.json)을 깃허브에 저장합니다.
      # 그래야 내일 아침에 로봇이 어제 뭐 샀는지 기억하고 수익 인증을 합니다.
      - name: Commit and Push Trades Record
        run: |
          git config --global user.name "ValueRadarBot"
          git config --global user.email "bot@valueradar.com"
          git add trades.json
          git commit -m "Update trades record [skip ci]" || echo "No changes to commit"
          git push
