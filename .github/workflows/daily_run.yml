name: Value Radar Bot

on:
  schedule:
    # 한국 시간 기준 오전 8시 15분 (UTC 23:15)
    - cron: '15 23 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python 최신 버전 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 3.9에서 3.10으로 업그레이드
      - name: 필수 도구 최신 버전 설치
        run: |
          # 기존 라이브러리를 완전히 지우고 최신으로 다시 설치합니다
          pip install --upgrade pip
          pip install -U google-generativeai finance-datareader requests pandas
      - name: 로봇 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
