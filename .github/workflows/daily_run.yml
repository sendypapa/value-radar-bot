name: Value Radar Bot

on:
  schedule:
    # 한국 시간 월~금 오전 07:20 실행
    # UTC 기준 일~목 22:20
    - cron: '20 22 * * 0-4'
  workflow_dispatch:

permissions: write-all

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai finance-datareader requests pandas beautifulsoup4

      - name: 1. 수익 인증 리포트 실행 (어제 결과 복기)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python report_performance.py

      - name: 2. 신규 종목 추천 실행 (오늘 분석 및 장부 기록)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python recommend_stocks.py

      - name: 3. 장부 파일 깃허브에 저장 (Commit & Push)
        run: |
          git config --global user.name "ValueRadarBot"
          git config --global user.email "bot@valueradar.com"
          git add trades.json performance_history.json || true
          git commit -m "Update trades/performance record [skip ci]" || echo "No changes to commit"
          git pull --rebase
          git push
