name: Value Radar Bot

on:
  schedule:
    - cron: '15 23 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python 3.12 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 2026년형 도구 설치
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai finance-datareader requests pandas
      - name: 로봇 가동
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
