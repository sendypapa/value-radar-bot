name: Value Radar Bot

on:
  schedule:
    - cron: '15 23 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3에서 v4로 업그레이드
      - name: Python 세팅
        uses: actions/setup-python@v5 # v4에서 v5로 업그레이드
        with:
          python-version: '3.9'
      - name: 필수 도구 설치
        run: |
          pip install finance-datareader google-generativeai requests pandas
      - name: 로봇 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
