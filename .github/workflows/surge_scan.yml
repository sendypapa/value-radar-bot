name: Surge Detection Bot

on:
  schedule:
    # 한국시간 09:00~15:45 / 15분 간격
    - cron: '0,15,30,45 0-6 * * 1-5'
  workflow_dispatch:

permissions: write-all

jobs:
  run-surge-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader requests beautifulsoup4

      - name: Run surge detection
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python detect_surge.py

      - name: Save sent list
        run: |
          git config --global user.name "ValueRadarBot"
          git config --global user.email "bot@valueradar.com"
          git add sent_stocks.json || true
          git commit -m "Update surge sent list [skip ci]" || echo "No changes"
          git pull --rebase
          git push
